upgrade_cilium:
  stage: upgrade_cilium

  extends:
    - .default_ansible_job

  needs:
    - ping_of_hosts

  rules:
    - changes:
        - ci/jobs/cilium.yml
        - k8s-net/group_vars/k8s-net-cilium.yml
        - roles/network_plugin/**/*
      when: manual

  variables:
    CILIUM_CODE_INPUT: ""
    CONFIRMATION_INPUT: "$CILIUM_CODE_INPUT"
    CONFIRMATION_SECRET: "$SECRET_CILIUM_CODE"

  script:
    - !reference [.confirmation_check, script]
    - !reference [.kubespray_common_steps, script]
    - ansible-playbook -i /inventory/inventory.ini --private-key /home/root/.ssh/id_rsa playbooks/cluster.yml --tags=network --vault-password-file .vault_pass