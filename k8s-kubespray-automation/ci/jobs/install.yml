install_k8s:
  stage: install

  extends:
    - .default_ansible_job

  needs:
    - ping_of_hosts

  rules:
    - changes:
        - ci/jobs/install.yml
        - k8s-net/group_vars/all/**/*
        - k8s-net/group_vars/k8s_cluster/**/*
      when: manual

  variables:
    INSTALL_CODE_INPUT: ""
    CONFIRMATION_INPUT: "$INSTALL_CODE_INPUT"
    CONFIRMATION_SECRET: "$SECRET_INSTALL_CODE"

  script:
    - !reference [.confirmation_check, script]
    - !reference [.kubespray_common_steps, script]
    - ansible-playbook -i /inventory/inventory.ini --private-key /home/root/.ssh/id_rsa extra_playbooks/harbor_ca.yml --vault-password-file .vault_pass
    - ansible-playbook -i /inventory/inventory.ini --private-key /home/root/.ssh/id_rsa playbooks/cluster.yml --vault-password-file .vault_pass