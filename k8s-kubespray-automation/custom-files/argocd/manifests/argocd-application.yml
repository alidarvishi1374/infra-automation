apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: default
  namespace: argocd
spec:
  sourceRepos: []
  destinations: []
  clusterResourceWhitelist: []
  namespaceResourceWhitelist: []
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: application-project
  namespace: argocd
spec:
  description: "Only allows Application manifests"
  sourceRepos:
    - "http://192.168.0.130/auto-k8s-apps/argocd-applications.git"
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: argoproj.io
      kind: Application
    - group: ""
      kind: Secret
    - group: ""
      kind: ConfigMap
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: projects-project
  namespace: argocd
spec:
  description: "Only allows AppProject manifests"
  sourceRepos:
    - "http://192.168.0.130/auto-k8s-apps/argocd-projects.git"
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: argoproj.io
      kind: AppProject
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-applications
  namespace: argocd
spec:
  project: application-project
  source:
    repoURL: http://192.168.0.130/auto-k8s-apps/argocd-applications.git
    targetRevision: HEAD
    path: "."
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-projects
  namespace: argocd
spec:
  project: projects-project
  source:
    repoURL: http://192.168.0.130/auto-k8s-apps/argocd-projects.git
    targetRevision: main
    path: "."
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-application-gitlab-credentials
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
data:
  type: Z2l0
  url: aHR0cDovLzE5Mi4xNjguMC4xMzAvYXV0by1rOHMtYXBwcy9hcmdvY2QtYXBwbGljYXRpb25zLmdpdA==
  username: ${ARGOCD_GITLAB_USERNAME_B64}
  password: ${ARGOCD_GITLAB_PASSWORD_B64}
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-project-gitlab-credentials
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
data:
  type: Z2l0
  url: aHR0cDovLzE5Mi4xNjguMC4xMzAvYXV0by1rOHMtYXBwcy9hcmdvY2QtcHJvamVjdHMuZ2l0
  username: ${ARGOCD_GITLAB_USERNAME_B64}
  password: ${ARGOCD_GITLAB_PASSWORD_B64}